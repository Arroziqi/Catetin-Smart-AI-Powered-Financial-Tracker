basePath: /
definitions:
  dto.AuthResponse:
    properties:
      access_token:
        type: string
    type: object
  dto.CreateTransactionRequest:
    properties:
      category:
        type: string
      date:
        description: YYYY-MM-DD
        type: string
      items:
        items:
          $ref: '#/definitions/dto.ItemDTO'
        type: array
      note:
        type: string
      store_name:
        type: string
      subtotal:
        type: number
      tax:
        type: number
      total:
        type: number
      type:
        description: income | expense
        type: string
    required:
    - category
    - date
    - total
    - type
    type: object
  dto.ItemDTO:
    properties:
      name:
        type: string
      price:
        minimum: 0
        type: number
      qty:
        minimum: 1
        type: integer
    required:
    - name
    - price
    - qty
    type: object
  dto.LoginRequest:
    properties:
      email:
        example: user@mail.com
        type: string
      password:
        example: "123456"
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        example: user@mail.com
        type: string
      password:
        example: "123456"
        type: string
    type: object
  dto.ScanReceiptResponse:
    properties:
      date:
        example: "2026-04-26"
        type: string
      items:
        items:
          $ref: '#/definitions/dto.ItemDTO'
        type: array
      store_name:
        example: Alfamart
        type: string
      subtotal:
        example: 8000
        type: number
      tax:
        example: 0
        type: number
      total:
        example: 8000
        type: number
    type: object
  dto.UpdateTransactionRequest:
    properties:
      category:
        type: string
      date:
        description: YYYY-MM-DD
        type: string
      items:
        items:
          $ref: '#/definitions/dto.ItemDTO'
        type: array
      note:
        type: string
      store_name:
        type: string
      subtotal:
        type: number
      tax:
        type: number
      total:
        type: number
      type:
        type: string
    required:
    - category
    - date
    - total
    - type
    type: object
info:
  contact: {}
  description: API Catetin Backend
  title: Catetin API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login Data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Register Data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register user
      tags:
      - auth
  /api/v1/transactions:
    get:
      consumes:
      - application/json
      description: Retrieve a list of transactions with pagination and filtering
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by category
        in: query
        name: category
        type: string
      - description: Filter by type (income | expense)
        in: query
        name: type
        type: string
      - description: Start date YYYY-MM-DD
        in: query
        name: start_date
        type: string
      - description: End date YYYY-MM-DD
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get transactions
      tags:
      - transactions
    post:
      consumes:
      - application/json
      description: Creates a new financial transaction (income/expense)
      parameters:
      - description: Transaction Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTransactionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a transaction
      tags:
      - transactions
  /api/v1/transactions/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes an existing transaction by ID
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete a transaction
      tags:
      - transactions
    put:
      consumes:
      - application/json
      description: Updates an existing transaction by ID
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      - description: Transaction Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateTransactionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update a transaction
      tags:
      - transactions
  /api/v1/transactions/scan:
    post:
      consumes:
      - multipart/form-data
      description: Upload image receipt and extract shopping data
      parameters:
      - description: Receipt image
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ScanReceiptResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: OCR receipt image
      tags:
      - transactions
  /health:
    get:
      consumes:
      - application/json
      description: Check if the API is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health Check
      tags:
      - health
security:
- BearerAuth: []
securityDefinitions:
  BearerAuth:
    description: 'Input token dengan format: Bearer <jwt_token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
